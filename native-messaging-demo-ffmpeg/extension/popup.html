<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FFmpeg Demo</title>
    <style>
        body {
            margin: 12px;
            font-family: Arial, sans-serif;
            min-width: 300px;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        .row {
            display: grid;
            gap: 8px;
            margin-bottom: 10px;
        }

        .two {
            grid-template-columns: 1fr 1fr;
        }

        input,
        button,
        select {
            width: 100%;
            padding: 8px;
        }

        .status {
            font-size: 12px;
            min-height: 18px;
            color: #444;
        }
    </style>
</head>

<body>
    <h1>FFmpeg Capture</h1>
    <div class="row">
        <button id="listDevices">List Devices</button>
        <select id="deviceSelect"></select>
        <button id="startCapture">Start Capture</button>
        <button id="stopCapture">Stop Capture</button>
    </div>
    <div class="row">
        <input id="fileName" type="text" placeholder="output_custom.mp4" />
    </div>
    <div class="row two">
        <input id="width" type="number" min="1" placeholder="width" />
        <input id="height" type="number" min="1" placeholder="height" />
    </div>
    <div class="row two">
        <input id="cropW" type="number" min="1" placeholder="crop w" />
        <input id="cropH" type="number" min="1" placeholder="crop h" />
    </div>
    <div class="row two">
        <input id="cropX" type="number" min="0" placeholder="crop x" value="0" />
        <input id="cropY" type="number" min="0" placeholder="crop y" value="0" />
    </div>
    <div class="row two">
        <input id="pixFmt" type="text" placeholder="yuv420p" />
        <input id="duration" type="number" min="0.1" step="0.1" placeholder="duration(s)" />
    </div>
    <div class="status" id="status">Waiting for command.</div>
    <script src="popup.js"></script>
</body>

</html>
