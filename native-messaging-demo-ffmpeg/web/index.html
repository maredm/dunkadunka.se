<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Native Messaging FFmpeg Web Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f8fb;
            color: #1f2a37;
        }

        main {
            max-width: 760px;
            margin: 24px auto;
            background: #fff;
            border: 1px solid #d7e0e8;
            border-radius: 12px;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
        }

        select,
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        .row {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .status {
            min-height: 20px;
            color: #5d6c7f;
            font-size: 13px;
        }

        .status.error {
            color: #b00020;
        }

        code {
            background: #eef3f9;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <main>
        <h1>FFmpeg AVFoundation Capture</h1>
        <p>Lists devices using <code>ffmpeg -f avfoundation -list_devices true -i ""</code> and starts capture to
            <code>video/output_&lt;id&gt;.mp4</code>.</p>

        <div class="row">
            <button id="listDevices">List Devices</button>
            <button id="startCapture">Start Capture</button>
        </div>

        <label for="deviceSelect">Video device</label>
        <select id="deviceSelect">
            <option value="">Load devices first</option>
        </select>

        <div id="status" class="status">Bridge idle.</div>
    </main>

    <script>
        const listDevicesButton = document.getElementById("listDevices");
        const startCaptureButton = document.getElementById("startCapture");
        const deviceSelect = document.getElementById("deviceSelect");
        const statusEl = document.getElementById("status");

        let requestCounter = 0;

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.classList.toggle("error", isError);
        }

        function sendNativeCommand(payload) {
            return new Promise((resolve, reject) => {
                const id = `ffmpeg-demo-${Date.now()}-${requestCounter++}`;

                const timeout = setTimeout(() => {
                    window.removeEventListener("message", onMessage);
                    reject(new Error("No response from extension bridge"));
                }, 5000);

                function onMessage(event) {
                    if (event.source !== window) {
                        return;
                    }

                    const data = event.data;
                    if (!data || data.type !== "ffmpeg-demo-response" || data.id !== id) {
                        return;
                    }

                    clearTimeout(timeout);
                    window.removeEventListener("message", onMessage);
                    resolve(data.response);
                }

                window.addEventListener("message", onMessage);
                window.postMessage({ type: "ffmpeg-demo-command", id, payload }, "*");
            });
        }

        function fillDevices(videoDevices) {
            deviceSelect.innerHTML = "";
            if (!Array.isArray(videoDevices) || videoDevices.length === 0) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "No AVFoundation video devices found";
                deviceSelect.appendChild(option);
                return;
            }

            videoDevices.forEach((device) => {
                const option = document.createElement("option");
                option.value = String(device.id);
                option.textContent = `[${device.id}] ${device.name}`;
                deviceSelect.appendChild(option);
            });
        }

        async function listDevices() {
            setStatus("Listing devices...");
            const response = await sendNativeCommand({ action: "list_devices" });
            if (!response?.ok) {
                setStatus(response?.error || "Failed to list devices", true);
                return;
            }

            fillDevices(response.video_devices || []);
            setStatus("Devices loaded.");
        }

        async function startCapture() {
            const deviceId = Number(deviceSelect.value);
            if (!Number.isInteger(deviceId)) {
                setStatus("Select a valid device", true);
                return;
            }

            setStatus(`Starting capture for device ${deviceId}...`);
            const response = await sendNativeCommand({ action: "start_capture", device_id: deviceId });
            if (!response?.ok) {
                setStatus(response?.error || "Failed to start capture", true);
                return;
            }

            setStatus(`Capture started. PID ${response.pid}. Output ${response.output_file}`);
        }

        listDevicesButton.addEventListener("click", () => {
            listDevices().catch((err) => setStatus(err?.message || "Unexpected error", true));
        });

        startCaptureButton.addEventListener("click", () => {
            startCapture().catch((err) => setStatus(err?.message || "Unexpected error", true));
        });
    </script>
</body>

</html>
