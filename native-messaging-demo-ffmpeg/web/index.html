<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Native Messaging FFmpeg Web Demo</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f6f8fb;
            color: #1f2a37;
        }

        main {
            max-width: 760px;
            margin: 24px auto;
            background: #fff;
            border: 1px solid #d7e0e8;
            border-radius: 12px;
            padding: 20px;
        }

        h1 {
            margin-top: 0;
        }

        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: 600;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
        }

        .row {
            display: grid;
            gap: 10px;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }

        .status {
            min-height: 20px;
            color: #5d6c7f;
            font-size: 13px;
        }

        .status.error {
            color: #b00020;
        }

        code {
            background: #eef3f9;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <main>
        <h1>FFmpeg AVFoundation Capture</h1>
        <p>Lists devices using <code>ffmpeg -f avfoundation -list_devices true -i ""</code> and starts capture to
            <code>video/output_&lt;id&gt;.mp4</code>.</p>

        <div class="row">
            <button id="listDevices">List Devices</button>
            <button id="startCapture">Start Capture</button>
            <button id="stopCapture">Stop Capture</button>
        </div>

        <label for="deviceSelect">Video device</label>
        <select id="deviceSelect">
            <option value="">Load devices first</option>
        </select>

        <label for="fileName">Filename (optional)</label>
        <input id="fileName" type="text" placeholder="output_custom.mp4" />

        <label>Resolution (optional)</label>
        <div class="row">
            <input id="width" type="number" min="1" placeholder="width" />
            <input id="height" type="number" min="1" placeholder="height" />
        </div>

        <label>Crop (optional)</label>
        <div class="row">
            <input id="cropW" type="number" min="1" placeholder="crop w" />
            <input id="cropH" type="number" min="1" placeholder="crop h" />
        </div>
        <div class="row">
            <input id="cropX" type="number" min="0" placeholder="crop x" value="0" />
            <input id="cropY" type="number" min="0" placeholder="crop y" value="0" />
        </div>

        <label for="pixFmt">Pixel format (optional)</label>
        <input id="pixFmt" type="text" placeholder="yuv420p" />

        <label for="duration">Duration seconds (optional)</label>
        <input id="duration" type="number" min="0.1" step="0.1" placeholder="10" />

        <div id="status" class="status">Bridge idle.</div>
    </main>

    <script>
        const listDevicesButton = document.getElementById("listDevices");
        const startCaptureButton = document.getElementById("startCapture");
        const stopCaptureButton = document.getElementById("stopCapture");
        const deviceSelect = document.getElementById("deviceSelect");
        const fileNameInput = document.getElementById("fileName");
        const widthInput = document.getElementById("width");
        const heightInput = document.getElementById("height");
        const cropWInput = document.getElementById("cropW");
        const cropHInput = document.getElementById("cropH");
        const cropXInput = document.getElementById("cropX");
        const cropYInput = document.getElementById("cropY");
        const pixFmtInput = document.getElementById("pixFmt");
        const durationInput = document.getElementById("duration");
        const statusEl = document.getElementById("status");
        let lastPid = null;

        let requestCounter = 0;

        function setStatus(text, isError = false) {
            statusEl.textContent = text;
            statusEl.classList.toggle("error", isError);
        }

        function sendNativeCommand(payload) {
            return new Promise((resolve, reject) => {
                const id = `ffmpeg-demo-${Date.now()}-${requestCounter++}`;

                const timeout = setTimeout(() => {
                    window.removeEventListener("message", onMessage);
                    reject(new Error("No response from extension bridge"));
                }, 5000);

                function onMessage(event) {
                    if (event.source !== window) {
                        return;
                    }

                    const data = event.data;
                    if (!data || data.type !== "ffmpeg-demo-response" || data.id !== id) {
                        return;
                    }

                    clearTimeout(timeout);
                    window.removeEventListener("message", onMessage);
                    resolve(data.response);
                }

                window.addEventListener("message", onMessage);
                window.postMessage({ type: "ffmpeg-demo-command", id, payload }, "*");
            });
        }

        function checkBridgeAvailability() {
            return new Promise((resolve, reject) => {
                const id = `ffmpeg-bridge-${Date.now()}-${requestCounter++}`;

                const timeout = setTimeout(() => {
                    window.removeEventListener("message", onMessage);
                    reject(new Error("No response from extension bridge"));
                }, 1500);

                function onMessage(event) {
                    if (event.source !== window) {
                        return;
                    }

                    const data = event.data;
                    if (!data || data.type !== "ffmpeg-demo-bridge-pong" || data.id !== id) {
                        return;
                    }

                    clearTimeout(timeout);
                    window.removeEventListener("message", onMessage);
                    resolve(true);
                }

                window.addEventListener("message", onMessage);
                window.postMessage({ type: "ffmpeg-demo-bridge-ping", id }, "*");
            });
        }

        function fillDevices(videoDevices) {
            deviceSelect.innerHTML = "";
            if (!Array.isArray(videoDevices) || videoDevices.length === 0) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "No AVFoundation video devices found";
                deviceSelect.appendChild(option);
                return;
            }

            videoDevices.forEach((device) => {
                const option = document.createElement("option");
                option.value = String(device.id);
                option.textContent = `[${device.id}] ${device.name}`;
                deviceSelect.appendChild(option);
            });
        }

        function getOptionalInt(input) {
            const raw = input.value.trim();
            if (!raw) {
                return null;
            }
            const value = Number(raw);
            if (!Number.isInteger(value)) {
                return null;
            }
            return value;
        }

        function buildOptions() {
            const options = {};

            const fileName = fileNameInput.value.trim();
            if (fileName) {
                options.filename = fileName;
            }

            const width = getOptionalInt(widthInput);
            const height = getOptionalInt(heightInput);
            if ((width === null) !== (height === null)) {
                throw new Error("Provide both width and height");
            }
            if (width !== null && height !== null) {
                options.width = width;
                options.height = height;
            }

            const cropW = getOptionalInt(cropWInput);
            const cropH = getOptionalInt(cropHInput);
            const cropX = getOptionalInt(cropXInput) ?? 0;
            const cropY = getOptionalInt(cropYInput) ?? 0;
            if ((cropW === null) !== (cropH === null)) {
                throw new Error("Provide both crop width and crop height");
            }
            if (cropW !== null && cropH !== null) {
                options.crop = { w: cropW, h: cropH, x: Math.max(0, cropX), y: Math.max(0, cropY) };
            }

            const pixFmt = pixFmtInput.value.trim();
            if (pixFmt) {
                options.pix_fmt = pixFmt;
            }

            const durationRaw = durationInput.value.trim();
            if (durationRaw) {
                const duration = Number(durationRaw);
                if (!Number.isFinite(duration) || duration <= 0) {
                    throw new Error("Duration must be a positive number");
                }
                options.duration_seconds = duration;
            }

            return options;
        }

        async function listDevices() {
            setStatus("Listing devices...");
            const response = await sendNativeCommand({ action: "list_devices" });
            if (!response?.ok) {
                setStatus(response?.error || "Failed to list devices", true);
                return;
            }

            fillDevices(response.video_devices || []);
            setStatus("Devices loaded.");
        }

        async function startCapture() {
            const deviceId = Number(deviceSelect.value);
            if (!Number.isInteger(deviceId)) {
                setStatus("Select a valid device", true);
                return;
            }

            let options;
            try {
                options = buildOptions();
            } catch (err) {
                setStatus(err?.message || "Invalid capture options", true);
                return;
            }

            setStatus(`Starting capture for device ${deviceId}...`);
            const response = await sendNativeCommand({
                action: "start_capture",
                device_id: deviceId,
                options,
            });
            if (!response?.ok) {
                setStatus(response?.error || "Failed to start capture", true);
                return;
            }

            lastPid = response.pid || null;
            setStatus(`Capture started. PID ${response.pid}. Output ${response.output_file}`);
        }

        async function stopCapture() {
            setStatus("Stopping capture...");
            const payload = { action: "stop_capture" };

            if (lastPid) {
                payload.pid = lastPid;
            } else {
                const deviceId = Number(deviceSelect.value);
                if (Number.isInteger(deviceId)) {
                    payload.device_id = deviceId;
                }
            }

            const response = await sendNativeCommand(payload);
            if (!response?.ok) {
                setStatus(response?.error || "Failed to stop capture", true);
                return;
            }

            setStatus(`Capture stopped for PID ${response.pid}`);
        }

        listDevicesButton.addEventListener("click", () => {
            listDevices().catch((err) => setStatus(err?.message || "Unexpected error", true));
        });

        startCaptureButton.addEventListener("click", () => {
            startCapture().catch((err) => setStatus(err?.message || "Unexpected error", true));
        });

        stopCaptureButton.addEventListener("click", () => {
            stopCapture().catch((err) => setStatus(err?.message || "Unexpected error", true));
        });

        checkBridgeAvailability().catch(() => {
            setStatus(
                "Extension bridge not detected. Reload extension, enable Allow access to file URLs, and open this page as /native-messaging-demo-ffmpeg/web/index.html or /native-messaging-demo-ffmpeg/web/.",
                true
            );
        });
    </script>
</body>

</html>
