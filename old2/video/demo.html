<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FFmpeg Controller Web Demo</title>
    <style>
        :root {
            --bg: #f8fafc;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #334155;
            --border: #cbd5e1;
            --brand: #0f766e;
            --brand-strong: #115e59;
            --error: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
            background: radial-gradient(circle at 20% 0%, #d1fae5, #f8fafc 42%);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
        }

        .shell {
            max-width: 760px;
            margin: 0 auto;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        p {
            margin: 0 0 16px;
            color: var(--muted);
            line-height: 1.45;
        }

        .row {
            display: grid;
            gap: 10px;
            margin-bottom: 12px;
        }

        .two {
            grid-template-columns: 1fr 1fr;
        }

        @media (max-width: 700px) {
            .two {
                grid-template-columns: 1fr;
            }
        }

        label {
            font-size: 13px;
            color: var(--muted);
            display: block;
            margin-bottom: 4px;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            font: inherit;
        }

        button {
            background: var(--brand);
            color: #ffffff;
            border: none;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: var(--brand-strong);
        }

        .status {
            margin-top: 8px;
            min-height: 24px;
            font-size: 13px;
            color: var(--muted);
            white-space: pre-wrap;
        }

        .status.error {
            color: var(--error);
        }
    </style>
</head>

<body>
    <main class="shell">
        <h1>FFmpeg Controller Demo</h1>
        <p>
            This page talks to the extension via a content-script bridge. Load this page in Chrome,
            then use the controls below.
        </p>

        <div class="row">
            <button id="listDevicesBtn">List Video Devices</button>
        </div>

        <div class="row">
            <div>
                <label for="videoDeviceSelect">Video Device</label>
                <select id="videoDeviceSelect"></select>
            </div>
        </div>

        <div class="row two">
            <div>
                <label for="durationInput">Duration (seconds)</label>
                <input id="durationInput" type="number" min="0.1" step="0.1" value="5" />
            </div>
            <div>
                <label for="outputInput">Output file</label>
                <input id="outputInput" type="text" placeholder="demo.mp4" />
            </div>
        </div>

        <div class="row">
            <button id="recordBtn">Record For Duration</button>
        </div>

        <div id="status" class="status">Ready.</div>
    </main>

    <script>
        const statusEl = document.getElementById("status");
        const videoDeviceSelect = document.getElementById("videoDeviceSelect");
        const durationInput = document.getElementById("durationInput");
        const outputInput = document.getElementById("outputInput");

        function setStatus(message, isError = false) {
            statusEl.textContent = message;
            statusEl.classList.toggle("error", isError);
        }

        function sendNative(payload) {
            const requestId = `${Date.now()}_${Math.random().toString(16).slice(2)}`;
            return new Promise((resolve) => {
                let resolved = false;

                function finalize(response) {
                    if (resolved) {
                        return;
                    }
                    resolved = true;
                    window.removeEventListener("message", onMessage);
                    resolve(response);
                }

                function onMessage(event) {
                    if (event.source !== window) {
                        return;
                    }
                    const data = event.data;
                    if (!data || data.source !== "ffmpeg-controller-extension" || data.requestId !== requestId) {
                        return;
                    }
                    finalize(data.response || { ok: false, error: "Empty response" });
                }

                window.addEventListener("message", onMessage);
                window.postMessage(
                    {
                        source: "ffmpeg-controller-web",
                        type: "native-command",
                        requestId,
                        payload,
                    },
                    "*"
                );

                setTimeout(() => {
                    finalize({ ok: false, error: "Timed out waiting for extension response" });
                }, 10000);
            });
        }

        function fillDevices(videoDevices) {
            videoDeviceSelect.innerHTML = "";
            if (!Array.isArray(videoDevices) || videoDevices.length === 0) {
                const option = document.createElement("option");
                option.value = "";
                option.textContent = "No video devices found";
                videoDeviceSelect.appendChild(option);
                return;
            }

            for (const device of videoDevices) {
                const option = document.createElement("option");
                option.value = String(device.id);
                option.textContent = `[${device.id}] ${device.name}`;
                videoDeviceSelect.appendChild(option);
            }
        }

        async function listDevices() {
            setStatus("Listing devices...");
            const response = await sendNative({ action: "list_devices" });
            if (!response.ok) {
                setStatus(response.error || "Failed to list devices", true);
                return;
            }

            fillDevices(response.video_devices || []);
            const platform = response.platform ? ` on ${response.platform}` : "";
            setStatus(`Loaded ${response.video_devices?.length || 0} video device(s)${platform}.`);
        }

        async function recordForDuration() {
            const videoDeviceId = Number(videoDeviceSelect.value);
            if (!Number.isInteger(videoDeviceId) || videoDeviceId < 0) {
                setStatus("Select a valid video device", true);
                return;
            }

            const duration = Number(durationInput.value);
            if (!Number.isFinite(duration) || duration <= 0) {
                setStatus("Duration must be a positive number", true);
                return;
            }

            const payload = {
                action: "record_for_duration",
                video_device_id: videoDeviceId,
                duration_seconds: duration,
            };

            const outputFile = outputInput.value.trim();
            if (outputFile) {
                payload.output_file = outputFile;
            }

            setStatus(`Recording device ${videoDeviceId} for ${duration}s...`);
            const response = await sendNative(payload);
            if (!response.ok) {
                setStatus(response.error || "Recording failed", true);
                return;
            }

            setStatus(`Saved recording: ${response.output_file}`);
        }

        document.getElementById("listDevicesBtn").addEventListener("click", () => {
            listDevices().catch((error) => setStatus(error.message || "Unexpected error", true));
        });

        document.getElementById("recordBtn").addEventListener("click", () => {
            recordForDuration().catch((error) => setStatus(error.message || "Unexpected error", true));
        });

        listDevices().catch((error) => setStatus(error.message || "Unexpected error", true));
    </script>
</body>

</html>
